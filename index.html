<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betcio Musteri Temsilcileri</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="theme-color" content="#09090b" />
</head>

<body class="min-h-screen bg-zinc-950 text-white antialiased">
  <main class="min-h-screen px-4 py-6 sm:px-6">
    <section class="mx-auto flex min-h-[calc(100vh-48px)] w-full max-w-md flex-col justify-center">
      <div class="mb-8 text-center">
        <div class="mx-auto mb-4 flex h-14 w-28 items-center justify-center rounded-2xl border border-white/10 bg-white/5 shadow-lg shadow-black/30">
          <span class="text-lg font-bold tracking-wide">BETC&#304;O</span>
        </div>
        <p class="text-xs font-medium uppercase tracking-[0.18em] text-zinc-500">Betcio M&#252;&#351;teri Temsilcileri</p>
      </div>

      <div id="app"></div>
    </section>
  </main>

  <script>
    /*
      PANEL / VERI ALANI
      Yeni kisi eklemek icin asagidaki formati kopyalayip cogaltman yeterli.

      id: URL'de kullanilacak kisa isim. Turkce karakter ve bosluk kullanma.
      name: Sayfada gorunecek ad soyad.
      whatsapp: Kisinin WhatsApp linki.
      telegram: Kisinin Telegram linki.
    */
    const users = [
      { id: "elisa", name: "EL\u0130SA", whatsapp: "", telegram: "" },
      { id: "orkun", name: "ORKUN", whatsapp: "", telegram: "" },
      { id: "melis", name: "MEL\u0130S", whatsapp: "", telegram: "" },
      { id: "alp", name: "ALP", whatsapp: "", telegram: "" },
      { id: "eren", name: "EREN", whatsapp: "", telegram: "" },
      { id: "demet", name: "DEMET", whatsapp: "", telegram: "" },
      { id: "cem", name: "CEM", whatsapp: "", telegram: "" },
      { id: "dilara", name: "D\u0130LARA", whatsapp: "", telegram: "" },
      { id: "ilayda", name: "\u0130LAYDA", whatsapp: "", telegram: "" },
      { id: "eylem", name: "EYLEM", whatsapp: "", telegram: "" },
      { id: "okan", name: "OKAN", whatsapp: "", telegram: "" },
      { id: "azra", name: "AZRA", whatsapp: "", telegram: "" },
      { id: "leyla", name: "LEYLA", whatsapp: "", telegram: "" },
      { id: "tansel", name: "TANSEL", whatsapp: "", telegram: "" },
      { id: "arda", name: "ARDA", whatsapp: "", telegram: "" },
      { id: "ayaz", name: "AYAZ", whatsapp: "", telegram: "" },
      { id: "serhat", name: "SERHAT", whatsapp: "", telegram: "" },
      { id: "defne", name: "DEFNE", whatsapp: "", telegram: "" },
      { id: "asena", name: "ASENA", whatsapp: "", telegram: "" },
      { id: "mehmet", name: "MEHMET", whatsapp: "", telegram: "" },
      { id: "dogukan", name: "DO\u011eUKAN", whatsapp: "", telegram: "" },
      { id: "zehra", name: "ZEHRA", whatsapp: "", telegram: "" },
      { id: "deniz", name: "DEN\u0130Z", whatsapp: "", telegram: "" },
      { id: "sude", name: "SUDE", whatsapp: "", telegram: "" },
      { id: "tekin", name: "TEK\u0130N", whatsapp: "", telegram: "" },
      { id: "afra", name: "AFRA", whatsapp: "", telegram: "" },
      { id: "umit", name: "\u00dcM\u0130T", whatsapp: "", telegram: "" },
      { id: "emir", name: "EM\u0130R", whatsapp: "", telegram: "" },
      { id: "gozde", name: "G\u00d6ZDE", whatsapp: "", telegram: "" },
      { id: "berk", name: "BERK", whatsapp: "", telegram: "" },
      { id: "sercan", name: "SERCAN", whatsapp: "", telegram: "" },
      { id: "cagri", name: "\u00c7A\u011eRI", whatsapp: "", telegram: "" },
      { id: "idil", name: "\u0130D\u0130L", whatsapp: "", telegram: "" },
      { id: "celik", name: "\u00c7EL\u0130K", whatsapp: "", telegram: "" },
      { id: "gorkem", name: "G\u00d6RKEM", whatsapp: "", telegram: "" },
      { id: "deren", name: "DEREN", whatsapp: "", telegram: "" },
      { id: "sarp", name: "SARP", whatsapp: "", telegram: "" },
      { id: "mert", name: "MERT", whatsapp: "", telegram: "" },
      { id: "ahsen", name: "AHSEN", whatsapp: "", telegram: "" },
      { id: "kenan", name: "KENAN", whatsapp: "", telegram: "" },
      { id: "simay", name: "S\u0130MAY", whatsapp: "", telegram: "" },
      { id: "esref", name: "E\u015eREF", whatsapp: "", telegram: "" },
      { id: "bartu", name: "BARTU", whatsapp: "", telegram: "" }
    ];

    const app = document.getElementById("app");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getUserIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const queryUser = params.get("user");

      if (queryUser) {
        return queryUser;
      }

      return window.location.hash ? window.location.hash.replace("#", "") : "";
    }

    function setUser(userId) {
      const cleanUrl = `${window.location.pathname}?user=${encodeURIComponent(userId)}`;
      window.history.pushState({}, "", cleanUrl);
      render();
    }

    function goHome() {
      window.history.pushState({}, "", window.location.pathname);
      render();
    }

    function renderHome() {
      const userButtons = users.map(user => `
        <button
          type="button"
          onclick="setUser('${escapeHtml(user.id)}')"
          class="group flex w-full items-center justify-between rounded-2xl border border-white/10 bg-white/[0.04] px-5 py-4 text-left shadow-lg shadow-black/20 transition duration-200 hover:scale-[1.02] hover:border-white/20 hover:bg-white/[0.08] active:scale-[0.99]"
        >
          <span>
            <span class="block text-base font-semibold text-white">${escapeHtml(user.name)}</span>
            <span class="mt-1 block text-sm text-zinc-500">Baglantilari goruntule</span>
          </span>

          <span class="flex h-9 w-9 items-center justify-center rounded-full bg-white/10 text-zinc-300 transition group-hover:bg-white group-hover:text-zinc-950">
            &rarr;
          </span>
        </button>
      `).join("");

      app.innerHTML = `
        <div class="rounded-3xl border border-white/10 bg-zinc-900/60 p-5 shadow-2xl shadow-black/40 backdrop-blur">
          <div class="mb-5 text-center">
            <h1 class="text-2xl font-bold tracking-tight text-white">
              L&#252;tfen g&#246;r&#252;&#351;mek istedi&#287;iniz ki&#351;iyi se&#231;iniz
            </h1>
            <p class="mt-2 text-sm leading-6 text-zinc-400">
              Listeden bir ki&#351;i se&#231;erek WhatsApp veya Telegram ba&#287;lant&#305;lar&#305;na ula&#351;abilirsiniz.
            </p>
          </div>

          <div class="grid gap-3">
            ${userButtons}
          </div>
        </div>
      `;
    }

    function renderContactButton(label, link, type) {
      const styles = {
        whatsapp: {
          active: "bg-emerald-500 shadow-emerald-950/40 hover:bg-emerald-400",
          disabled: "bg-zinc-800 text-zinc-500",
          icon: "W"
        },
        telegram: {
          active: "bg-sky-500 shadow-sky-950/40 hover:bg-sky-400",
          disabled: "bg-zinc-800 text-zinc-500",
          icon: "T"
        }
      };
      const theme = styles[type];

      if (!link) {
        return `
          <button
            type="button"
            disabled
            class="flex w-full cursor-not-allowed items-center justify-center gap-3 rounded-2xl px-5 py-4 text-base font-bold shadow-lg ${theme.disabled}"
          >
            <span class="text-xl">${theme.icon}</span>
            ${label} Linki Eklenecek
          </button>
        `;
      }

      return `
        <a
          href="${escapeHtml(link)}"
          target="_blank"
          rel="noopener noreferrer"
          class="flex w-full items-center justify-center gap-3 rounded-2xl px-5 py-4 text-base font-bold text-white shadow-lg transition duration-200 hover:scale-[1.03] active:scale-[0.99] ${theme.active}"
        >
          <span class="text-xl">${theme.icon}</span>
          ${label} ile Gorus
        </a>
      `;
    }

    function renderDetail(user) {
      app.innerHTML = `
        <div class="rounded-3xl border border-white/10 bg-zinc-900/70 p-6 text-center shadow-2xl shadow-black/40 backdrop-blur">
          <div class="mx-auto mb-5 flex h-20 w-20 items-center justify-center rounded-full border border-white/10 bg-white/5 text-2xl font-bold shadow-lg shadow-black/30">
            ${escapeHtml(getInitials(user.name))}
          </div>

          <h1 class="text-3xl font-bold tracking-tight text-white">
            ${escapeHtml(user.name)}
          </h1>

          <p class="mt-2 text-sm font-medium uppercase tracking-[0.24em] text-zinc-500">
            &#199;a&#287;r&#305; Ba&#287;lant&#305;lar&#305;
          </p>

          <div class="mt-8 grid gap-4">
            ${renderContactButton("WhatsApp", user.whatsapp, "whatsapp")}
            ${renderContactButton("Telegram", user.telegram, "telegram")}
          </div>

          <button
            type="button"
            onclick="goHome()"
            class="mt-7 w-full rounded-2xl border border-white/10 bg-white/[0.04] px-5 py-3 text-sm font-semibold text-zinc-300 transition duration-200 hover:border-white/20 hover:bg-white/[0.08] hover:text-white"
          >
            Geri Don
          </button>
        </div>
      `;
    }

    function renderNotFound() {
      app.innerHTML = `
        <div class="rounded-3xl border border-red-500/20 bg-red-950/20 p-6 text-center shadow-2xl shadow-black/40">
          <h1 class="text-2xl font-bold text-white">Kisi bulunamadi</h1>
          <p class="mt-2 text-sm leading-6 text-red-100/70">
            Bu baglantiya ait bir kullanici yok veya link hatali yazilmis olabilir.
          </p>

          <button
            type="button"
            onclick="goHome()"
            class="mt-6 w-full rounded-2xl bg-white px-5 py-3 text-sm font-bold text-zinc-950 transition duration-200 hover:scale-[1.02] active:scale-[0.99]"
          >
            Listeye Don
          </button>
        </div>
      `;
    }

    function getInitials(name) {
      return name
        .trim()
        .split(" ")
        .slice(0, 2)
        .map(part => part.charAt(0).toUpperCase())
        .join("");
    }

    function render() {
      const userId = getUserIdFromUrl();

      if (!userId) {
        renderHome();
        return;
      }

      const selectedUser = users.find(user => user.id === userId);

      if (!selectedUser) {
        renderNotFound();
        return;
      }

      renderDetail(selectedUser);
    }

    window.addEventListener("popstate", render);
    window.addEventListener("hashchange", render);

    render();
  </script>
</body>
</html>
