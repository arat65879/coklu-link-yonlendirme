<!doctype html>
<html lang="tr">

  <title>Betcio Musteri Temsilcileri</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="theme-color" content="#09090b" />
</head>

<body class="min-h-screen bg-[#07110c] text-white antialiased">
  <main class="min-h-screen bg-[radial-gradient(circle_at_top,#14532d_0,#07110c_42%,#050807_100%)] px-4 py-6 sm:px-6">
    <section class="mx-auto flex min-h-[calc(100vh-48px)] w-full max-w-lg flex-col justify-center">
      <div class="mb-6 text-center">
        <div class="mx-auto mb-4 flex h-14 w-28 items-center justify-center rounded-2xl border border-emerald-300/25 bg-emerald-400/15 shadow-lg shadow-emerald-950/40">
          <span class="text-lg font-bold tracking-wide text-emerald-100">BETC&#304;O</span>
        </div>
        <p class="text-xs font-medium uppercase tracking-[0.18em] text-emerald-200/70">Betcio M&#252;&#351;teri Temsilcileri</p>
      </div>

      <div id="app"></div>
    </section>
  </main>

  <script>
    /*

      name: Sayfada gorunecek ad soyad.
      whatsapp: Kisinin WhatsApp linki.

    */
    const users = [
      { id: "ahsen", name: "AHSEN", whatsapp: "", telegram: "/api/telegram?id=ahsen" },
      { id: "alp", name: "ALP", whatsapp: "", telegram: "/api/telegram?id=alp" },
      { id: "asena", name: "ASENA", whatsapp: "", telegram: "/api/telegram?id=asena" },
      { id: "ayaz", name: "AYAZ", whatsapp: "", telegram: "/api/telegram?id=ayaz" },
      { id: "azra", name: "AZRA", whatsapp: "", telegram: "/api/telegram?id=azra" },
      { id: "baris", name: "BARI\u015e", whatsapp: "", telegram: "/api/telegram?id=baris" },
      { id: "bartu", name: "BARTU", whatsapp: "", telegram: "/api/telegram?id=bartu" },
      { id: "berk", name: "BERK", whatsapp: "", telegram: "/api/telegram?id=berk" },
      { id: "betcio-tg-destek", name: "BETCIO TG DESTEK HATTI", whatsapp: "", telegram: "/api/telegram?id=betcio-tg-destek" },
      { id: "celik", name: "\u00c7EL\u0130K", whatsapp: "", telegram: "/api/telegram?id=celik" },
      { id: "cem", name: "CEM", whatsapp: "", telegram: "/api/telegram?id=cem" },
      { id: "defne", name: "DEFNE", whatsapp: "", telegram: "/api/telegram?id=defne" },
      { id: "demet", name: "DEMET", whatsapp: "", telegram: "/api/telegram?id=demet" },
      { id: "deniz", name: "DEN\u0130Z", whatsapp: "", telegram: "/api/telegram?id=deniz" },
      { id: "deren", name: "DEREN", whatsapp: "", telegram: "/api/telegram?id=deren" },
      { id: "dilara", name: "D\u0130LARA", whatsapp: "", telegram: "/api/telegram?id=dilara" },
      { id: "dogukan", name: "DO\u011eUKAN", whatsapp: "", telegram: "/api/telegram?id=dogukan" },
      { id: "ece", name: "ECE", whatsapp: "", telegram: "/api/telegram?id=ece" },
      { id: "elisa", name: "EL\u0130SA", whatsapp: "", telegram: "/api/telegram?id=elisa" },
      { id: "emir", name: "EM\u0130R", whatsapp: "", telegram: "/api/telegram?id=emir" },
      { id: "eren", name: "EREN", whatsapp: "", telegram: "/api/telegram?id=eren" },
      { id: "esref", name: "E\u015eREF", whatsapp: "", telegram: "/api/telegram?id=esref" },
      { id: "eylem", name: "EYLEM", whatsapp: "", telegram: "/api/telegram?id=eylem" },
      { id: "gorkem", name: "G\u00d6RKEM", whatsapp: "", telegram: "/api/telegram?id=gorkem" },
      { id: "gozde", name: "G\u00d6ZDE", whatsapp: "", telegram: "/api/telegram?id=gozde" },
      { id: "idil", name: "\u0130D\u0130L", whatsapp: "", telegram: "/api/telegram?id=idil" },
      { id: "ilayda", name: "\u0130LAYDA", whatsapp: "", telegram: "/api/telegram?id=ilayda" },
      { id: "leyla", name: "LEYLA", whatsapp: "", telegram: "/api/telegram?id=leyla" },
      { id: "mehmet", name: "MEHMET", whatsapp: "", telegram: "/api/telegram?id=mehmet" },
      { id: "melis", name: "MEL\u0130S", whatsapp: "", telegram: "/api/telegram?id=melis" },
      { id: "mert", name: "MERT", whatsapp: "", telegram: "/api/telegram?id=mert" },
      { id: "okan", name: "OKAN", whatsapp: "", telegram: "/api/telegram?id=okan" },
      { id: "orkun", name: "ORKUN", whatsapp: "", telegram: "/api/telegram?id=orkun" },
      { id: "ruya", name: "R\u00dcYA", whatsapp: "", telegram: "/api/telegram?id=ruya" },
      { id: "sarp", name: "SARP", whatsapp: "", telegram: "/api/telegram?id=sarp" },
      { id: "sercan", name: "SERCAN", whatsapp: "", telegram: "/api/telegram?id=sercan" },
      { id: "serhat", name: "SERHAT", whatsapp: "", telegram: "/api/telegram?id=serhat" },
      { id: "simay", name: "S\u0130MAY", whatsapp: "", telegram: "/api/telegram?id=simay" },
      { id: "sude", name: "SUDE", whatsapp: "", telegram: "/api/telegram?id=sude" },
      { id: "tansel", name: "TANSEL", whatsapp: "", telegram: "/api/telegram?id=tansel" },
      { id: "umit", name: "\u00dcM\u0130T", whatsapp: "", telegram: "/api/telegram?id=umit" }
    ];

    const app = document.getElementById("app");

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getUserIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const queryUser = params.get("user");

      if (queryUser) {
        return queryUser;
      }

      return window.location.hash ? window.location.hash.replace("#", "") : "";
    }

    function setUser(userId) {
      const cleanUrl = `${window.location.pathname}?user=${encodeURIComponent(userId)}`;
      window.history.pushState({}, "", cleanUrl);
      render();
    }

    function goHome() {
      window.history.pushState({}, "", window.location.pathname);
      render();
    }

    function normalizeText(value) {
      return String(value)
        .toLocaleLowerCase("tr-TR")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/Ä±/g, "i")
        .replace(/ÄŸ/g, "g")
        .replace(/Ã¼/g, "u")
        .replace(/ÅŸ/g, "s")
        .replace(/Ã¶/g, "o")
        .replace(/Ã§/g, "c");
    }

    function getFilteredUsers() {
      const input = document.getElementById("searchInput");
      const query = normalizeText(input ? input.value : "");

      if (!query) {
        return users;
      }

      return users.filter(user =>
        normalizeText(user.name).includes(query) || normalizeText(user.id).includes(query)
      );
    }

    function renderUserGrid() {
      const filteredUsers = getFilteredUsers();
      const list = document.getElementById("userList");
      const emptyState = document.getElementById("emptyState");

      if (!list || !emptyState) {
        return;
      }

      emptyState.classList.toggle("hidden", filteredUsers.length > 0);

      list.innerHTML = filteredUsers.map(user => `
        <button
          type="button"
          onclick="setUser('${escapeHtml(user.id)}')"
          class="group min-h-24 w-full rounded-2xl border border-emerald-300/15 bg-gradient-to-br from-white/[0.10] to-emerald-400/[0.06] p-4 text-left shadow-lg shadow-emerald-950/25 transition duration-200 hover:scale-[1.03] hover:border-emerald-300/40 hover:from-emerald-400/20 hover:to-lime-300/10 active:scale-[0.99]"
        >
          <span class="flex h-full flex-col justify-between gap-3">
            <span class="block break-words text-base font-extrabold leading-tight text-white">${escapeHtml(user.name)}</span>
            <span class="flex items-center justify-between gap-2 text-xs font-semibold text-emerald-200/80">
              <span>Hemen ba&#287;lan</span>
              <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-emerald-400 text-zinc-950 shadow-md shadow-emerald-950/30 transition group-hover:bg-lime-300">
                &rarr;
              </span>
            </span>
          </span>
        </button>
      `).join("");
    }

    function setHomeTab(tabName) {
      const representativesTab = document.getElementById("representativesTab");
      const linksTab = document.getElementById("linksTab");
      const representativesPanel = document.getElementById("representativesPanel");
      const linksPanel = document.getElementById("linksPanel");

      if (!representativesTab || !linksTab || !representativesPanel || !linksPanel) {
        return;
      }

      const isLinks = tabName === "links";

      representativesPanel.classList.toggle("hidden", isLinks);
      linksPanel.classList.toggle("hidden", !isLinks);

      representativesTab.className = getTabClass(!isLinks);
      linksTab.className = getTabClass(isLinks);
    }

    function getTabClass(isActive) {
      const base = "w-full rounded-2xl px-3 py-3 text-sm font-extrabold transition duration-200";
      return isActive
        ? `${base} bg-lime-300 text-zinc-950 shadow-lg shadow-lime-950/30`
        : `${base} border border-emerald-300/15 bg-white/[0.06] text-emerald-100/70 hover:bg-white/[0.10] hover:text-white`;
    }

    function renderHome() {
      const userCount = users.length;

      app.innerHTML = `
        <div class="rounded-3xl border border-emerald-300/20 bg-zinc-950/70 p-5 shadow-2xl shadow-emerald-950/50 backdrop-blur">
          <div class="mb-5 text-center">
            <div class="mx-auto mb-3 inline-flex items-center gap-2 rounded-full border border-emerald-300/20 bg-emerald-400/10 px-3 py-1 text-xs font-bold text-emerald-200">
              <span class="h-2 w-2 rounded-full bg-lime-300"></span>
              ${userCount} aktif temsilci
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-white">
              L&#252;tfen g&#246;r&#252;&#351;mek istedi&#287;iniz ki&#351;iyi se&#231;iniz
            </h1>
          </div>

          <div class="mb-4 grid grid-cols-2 gap-2 rounded-3xl border border-emerald-300/10 bg-black/20 p-2">
            <button id="representativesTab" type="button" onclick="setHomeTab('representatives')" class="${getTabClass(true)}">
              Temsilciler
            </button>
            <button id="linksTab" type="button" onclick="setHomeTab('links')" class="${getTabClass(false)}">
              G&#252;ncel Giri&#351;
            </button>
          </div>

          <div id="representativesPanel">
            <label class="mb-4 flex items-center gap-3 rounded-2xl border border-emerald-300/20 bg-white/[0.08] px-4 py-3 shadow-inner shadow-black/20 focus-within:border-lime-300/70">
              <span class="text-lg text-lime-300">âŒ•</span>
              <input
                id="searchInput"
                type="search"
                inputmode="search"
                autocomplete="off"
                placeholder="Temsilci ara: EREN"
                oninput="renderUserGrid()"
                class="w-full bg-transparent text-base font-semibold text-white placeholder:text-emerald-100/45 focus:outline-none"
              />
            </label>

            <div id="userList" class="grid grid-cols-2 gap-3"></div>

            <div id="emptyState" class="hidden rounded-2xl border border-amber-300/20 bg-amber-400/10 px-4 py-5 text-center text-sm font-semibold text-amber-100">
              Arad&#305;&#287;&#305;n&#305;z temsilci bulunamad&#305;.
            </div>
          </div>

          <div id="linksPanel" class="hidden">
            <div class="rounded-3xl border border-lime-300/20 bg-lime-300/10 p-4 text-center">
              <h2 class="text-xl font-extrabold text-white">G&#252;ncel Giri&#351; Adresleri</h2>
              <p class="mt-2 text-sm leading-6 text-emerald-100/75">
                A&#351;a&#287;&#305;daki linkler &#252;zerinden g&#252;ncel adreslerimize her zaman g&#252;venle ula&#351;abilirsiniz.
              </p>
            </div>

            <div class="mt-4 grid gap-3">
              <a href="https://cioresmi.com" target="_blank" rel="noopener noreferrer" class="group rounded-2xl border border-lime-300/25 bg-gradient-to-r from-lime-300 to-emerald-400 px-5 py-4 text-left text-zinc-950 shadow-lg shadow-emerald-950/40 transition duration-200 hover:scale-[1.02] active:scale-[0.99]">
                <span class="block text-xs font-black uppercase tracking-[0.18em] text-emerald-950/70">G&#252;ncel giri&#351; adresimiz</span>
                <span class="mt-1 flex items-center justify-between gap-3 text-lg font-black">
                  cioresmi.com
                  <span class="rounded-full bg-zinc-950 px-3 py-1 text-sm text-lime-200">A&#231;</span>
                </span>
              </a>

              <a href="https://t.me/betciogame" target="_blank" rel="noopener noreferrer" class="group rounded-2xl border border-sky-300/25 bg-sky-500/18 px-5 py-4 text-left shadow-lg shadow-sky-950/30 transition duration-200 hover:scale-[1.02] hover:bg-sky-500/25 active:scale-[0.99]">
                <span class="block text-xs font-black uppercase tracking-[0.18em] text-sky-200/70">Telegram adresimiz</span>
                <span class="mt-1 flex items-center justify-between gap-3 text-lg font-black text-white">
                  t.me/betciogame
                  <span class="rounded-full bg-sky-400 px-3 py-1 text-sm text-zinc-950">A&#231;</span>
                </span>
              </a>

              <a href="https://t.me/cioetkinlik" target="_blank" rel="noopener noreferrer" class="group rounded-2xl border border-fuchsia-300/25 bg-fuchsia-500/18 px-5 py-4 text-left shadow-lg shadow-fuchsia-950/30 transition duration-200 hover:scale-[1.02] hover:bg-fuchsia-500/25 active:scale-[0.99]">
                <span class="block text-xs font-black uppercase tracking-[0.18em] text-fuchsia-200/70">Telegram etkinlik kanal&#305;m&#305;z</span>
                <span class="mt-1 flex items-center justify-between gap-3 text-lg font-black text-white">
                  t.me/cioetkinlik
                  <span class="rounded-full bg-fuchsia-300 px-3 py-1 text-sm text-zinc-950">A&#231;</span>
                </span>
              </a>
            </div>
          </div>
        </div>
      `;

      renderUserGrid();
    }

    function renderContactButton(label, link, type) {
      const styles = {
        whatsapp: {
          active: "bg-emerald-500 shadow-emerald-950/40 hover:bg-emerald-400",
          disabled: "bg-zinc-800 text-zinc-500",
          icon: "W"
        },
        telegram: {
          active: "bg-sky-500 shadow-sky-950/40 hover:bg-sky-400",
          disabled: "bg-zinc-800 text-zinc-500",
          icon: "T"
        }
      };
      const theme = styles[type];

      if (!link) {
        return `
          <button
            type="button"
            disabled
            class="flex w-full cursor-not-allowed items-center justify-center gap-3 rounded-2xl px-5 py-4 text-base font-bold shadow-lg ${theme.disabled}"
          >
            <span class="text-xl">${theme.icon}</span>
            ${label} Linki Eklenecek
          </button>
        `;
      }

      return `
        <a
          href="${escapeHtml(link)}"
          target="_blank"
          rel="noopener noreferrer"
          class="flex w-full items-center justify-center gap-3 rounded-2xl px-5 py-4 text-base font-bold text-white shadow-lg transition duration-200 hover:scale-[1.03] active:scale-[0.99] ${theme.active}"
        >
          <span class="text-xl">${theme.icon}</span>
          ${label} ile Gorus
        </a>
      `;
    }

    function renderDetail(user) {
      app.innerHTML = `
        <div class="rounded-3xl border border-emerald-300/20 bg-zinc-950/75 p-6 text-center shadow-2xl shadow-emerald-950/50 backdrop-blur">
          <div class="mx-auto mb-5 flex h-20 w-20 items-center justify-center rounded-full border border-emerald-300/25 bg-emerald-400/15 text-2xl font-bold text-emerald-100 shadow-lg shadow-emerald-950/30">
            ${escapeHtml(getInitials(user.name))}
          </div>

          <h1 class="text-3xl font-bold tracking-tight text-white">
            ${escapeHtml(user.name)}
          </h1>

          <p class="mt-2 text-sm font-medium uppercase tracking-[0.24em] text-emerald-200/60">
            &#199;a&#287;r&#305; Ba&#287;lant&#305;lar&#305;
          </p>

          <div class="mt-8 grid gap-4">
            ${renderContactButton("WhatsApp", user.whatsapp, "whatsapp")}
            ${renderContactButton("Telegram", user.telegram, "telegram")}
          </div>

          <button
            type="button"
            onclick="goHome()"
            class="mt-7 w-full rounded-2xl border border-white/10 bg-white/[0.04] px-5 py-3 text-sm font-semibold text-zinc-300 transition duration-200 hover:border-white/20 hover:bg-white/[0.08] hover:text-white"
          >
            Geri Don
          </button>
        </div>
      `;
    }

    function renderNotFound() {
      app.innerHTML = `
        <div class="rounded-3xl border border-red-500/20 bg-red-950/20 p-6 text-center shadow-2xl shadow-black/40">
          <h1 class="text-2xl font-bold text-white">Kisi bulunamadi</h1>
          <p class="mt-2 text-sm leading-6 text-red-100/70">
            Bu baglantiya ait bir kullanici yok veya link hatali yazilmis olabilir.
          </p>

          <button
            type="button"
            onclick="goHome()"
            class="mt-6 w-full rounded-2xl bg-white px-5 py-3 text-sm font-bold text-zinc-950 transition duration-200 hover:scale-[1.02] active:scale-[0.99]"
          >
            Listeye Don
          </button>
        </div>
      `;
    }

    function getInitials(name) {
      return name
        .trim()
        .split(" ")
        .slice(0, 2)
        .map(part => part.charAt(0).toUpperCase())
        .join("");
    }

    function render() {
      const userId = getUserIdFromUrl();

      if (!userId) {
        renderHome();
        return;
      }

      const selectedUser = users.find(user => user.id === userId);

      if (!selectedUser) {
        renderNotFound();
        return;
      }

      renderDetail(selectedUser);
    }

    window.addEventListener("popstate", render);
    window.addEventListener("hashchange", render);

    render();
  </script>
</body>
</html>
