<!doctype html>

<head>

  <style>
    @keyframes textFlow {
      from {
        transform: translate3d(0, -38%, 0);
      }
      to {
        transform: translate3d(0, 18%, 0);
      }
    }

    @keyframes wordFall {
      from {
        transform: translate3d(0, -18vh, 0);
      }
      to {
        transform: translate3d(0, 118vh, 0);
      }
    }

    @keyframes dotWave {
      0%, 100% {
        transform: translate3d(0, 8px, 0);
      }
      50% {
        transform: translate3d(0, -8px, 0);
      }
    }

    @keyframes floatShape {
      0%, 100% {
        transform: translate3d(0, 0, 0) rotate(var(--r));
      }
      50% {
        transform: translate3d(10px, -18px, 0) rotate(calc(var(--r) + 10deg));
      }
    }

    @keyframes ctaPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(245, 196, 0, 0);
      }
      50% {
        transform: scale(1.08);
        box-shadow: 0 0 18px rgba(245, 196, 0, 0.35);
      }
    }

    @keyframes cardSweep {
      0% {
        transform: translateX(-140%) skewX(-18deg);
        opacity: 0;
      }
      18% {
        opacity: 0.35;
      }
      42%, 100% {
        transform: translateX(180%) skewX(-18deg);
        opacity: 0;
      }
    }

    .betcio-flow {
      animation: textFlow 18s linear infinite;
      text-shadow: 0 0 14px rgba(245, 196, 0, 0.25);
      transform: translateZ(0);
      will-change: transform;
    }

    .betcio-flow:nth-child(2) {
      animation-duration: 23s;
      animation-delay: -7s;
    }

    .falling-word {
      animation: wordFall var(--speed) linear infinite;
      animation-delay: var(--delay);
      color: rgba(245, 196, 0, 0.28);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.32em;
      position: absolute;
      text-shadow: 0 0 12px rgba(245, 196, 0, 0.22);
      top: 0;
      transform: translateZ(0);
      will-change: transform;
    }

    .dot-wave {
      animation: dotWave 12s ease-in-out infinite;
      background-image: radial-gradient(circle, rgba(245, 196, 0, 0.34) 0 1.2px, transparent 1.7px);
      background-size: 20px 20px;
      mask-image: radial-gradient(ellipse at center, black 0 48%, transparent 74%);
      transform: translateZ(0);
      will-change: transform;
    }

    .wire-shape {
      animation: floatShape 16s ease-in-out infinite;
      border: 1px solid rgba(245, 196, 0, 0.34);
      box-shadow: 0 0 22px rgba(245, 196, 0, 0.12);
      transform: rotate(var(--r));
      will-change: transform;
    }

    .wire-shape::before,
    .wire-shape::after {
      content: "";
      position: absolute;
      inset: 16%;
      border-top: 1px solid rgba(255, 255, 255, 0.20);
      transform: rotate(32deg);
    }

    .wire-shape::after {
      transform: rotate(-34deg);
    }

    .mesh-line {
      background: linear-gradient(90deg, transparent, rgba(245, 196, 0, 0.22), transparent);
      height: 1px;
      transform-origin: left center;
    }

    .rep-card::before {
      animation: cardSweep 3.4s ease-in-out infinite;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.26), transparent);
      content: "";
      height: 140%;
      left: 0;
      position: absolute;
      top: -20%;
      width: 42%;
    }

    .rep-cta {
      animation: ctaPulse 2.8s ease-in-out infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      .betcio-flow,
      .falling-word,
      .dot-wave,
      .wire-shape,
      .rep-card::before,
      .rep-cta {
        animation: none;
      }
    }
  </style>
</head>

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getUserIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const queryUser = params.get("user");

      if (queryUser) {
        return queryUser;
      }

      return window.location.hash ? window.location.hash.replace("#", "") : "";
    }

    function setUser(userId) {
      const cleanUrl = `${window.location.pathname}?user=${encodeURIComponent(userId)}`;
      window.history.pushState({}, "", cleanUrl);
      render();
    }

    function goHome() {
      window.history.pushState({}, "", window.location.pathname);
      render();
    }

    function normalizeText(value) {
      return String(value)
        .toLocaleLowerCase("tr-TR")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/Ä±/g, "i")
        .replace(/ÄŸ/g, "g")
        .replace(/Ã¼/g, "u")
        .replace(/ÅŸ/g, "s")
        .replace(/Ã¶/g, "o")
        .replace(/Ã§/g, "c");
    }

    function getFilteredUsers() {
      const input = document.getElementById("searchInput");
      const query = normalizeText(input ? input.value : "");

      if (!query) {
        return users;
      }

      return users.filter(user =>
        normalizeText(user.name).includes(query) || normalizeText(user.id).includes(query)
      );
    }

    function renderUserGrid() {
      const filteredUsers = getFilteredUsers();
      const list = document.getElementById("userList");
      const emptyState = document.getElementById("emptyState");

      if (!list || !emptyState) {
        return;
      }

      emptyState.classList.toggle("hidden", filteredUsers.length > 0);

      list.innerHTML = filteredUsers.map(user => `
        <button
          type="button"
          onclick="setUser('${escapeHtml(user.id)}')"
          class="rep-card group relative min-h-24 w-full overflow-hidden rounded-2xl border border-[#f5c400]/20 bg-gradient-to-br from-white/[0.10] to-[#f5c400]/[0.08] p-4 text-left shadow-lg shadow-black/35 transition duration-200 hover:scale-[1.03] hover:border-[#f5c400]/60 hover:from-[#f5c400]/20 hover:to-white/[0.08] active:scale-[0.99]"

            <span class="block break-words text-base font-extrabold leading-tight text-white">${escapeHtml(user.name)}</span>

    function renderContactButton(label, link, type) {
      const styles = {
        whatsapp: {
          active: "bg-emerald-500 shadow-emerald-950/40 hover:bg-emerald-400",
          disabled: "bg-zinc-800 text-zinc-500",
          icon: "W"
        },
        telegram: {
          active: "bg-[#f5c400] text-[#070b12] shadow-yellow-950/40 hover:bg-white",
          disabled: "bg-zinc-800 text-zinc-500",
          icon: "T"
        }
      };
      const theme = styles[type];

      if (!link) {
        return `
          <button
            type="button"
            disabled
            class="flex w-full cursor-not-allowed items-center justify-center gap-3 rounded-2xl px-5 py-4 text-base font-bold shadow-lg ${theme.disabled}"
          >
            <span class="text-xl">${theme.icon}</span>
            ${label} Linki Eklenecek
          </button>
        `;
      }

      return `
        <a
          href="${escapeHtml(link)}"
          target="_blank"
          rel="noopener noreferrer"
          class="flex w-full items-center justify-center gap-3 rounded-2xl px-5 py-4 text-base font-bold shadow-lg transition duration-200 hover:scale-[1.03] active:scale-[0.99] ${theme.active}"
        >
          <span class="text-xl">${theme.icon}</span>
          ${label} ile Gorus
        </a>
      `;
    }

    function renderDetail(user) {
      app.innerHTML = `
        <div class="rounded-3xl border border-[#f5c400]/25 bg-[#080c14]/85 p-6 text-center shadow-2xl shadow-black/60 backdrop-blur">
          <div class="mx-auto mb-5 flex h-20 w-20 items-center justify-center rounded-full border-4 border-[#f5c400] bg-[#101722] text-2xl font-black text-[#f5c400] shadow-lg shadow-yellow-950/30">
            ${escapeHtml(getInitials(user.name))}
          </div>

          <h1 class="text-3xl font-bold tracking-tight text-white">
            ${escapeHtml(user.name)}
          </h1>

          <p class="mt-2 text-sm font-black uppercase tracking-[0.24em] text-[#f5c400]/70">
            &#199;a&#287;r&#305; Ba&#287;lant&#305;lar&#305;
          </p>

          <div class="mt-8 grid gap-4">
            ${renderContactButton("WhatsApp", user.whatsapp, "whatsapp")}
            ${renderContactButton("Telegram", user.telegram, "telegram")}
          </div>

          <button
            type="button"
            onclick="goHome()"
            class="mt-7 w-full rounded-2xl border border-[#f5c400]/20 bg-white/[0.05] px-5 py-3 text-sm font-bold text-yellow-100 transition duration-200 hover:border-[#f5c400]/50 hover:bg-[#f5c400]/10 hover:text-white"
          >
            Geri Don
          </button>
        </div>
      `;
    }

    function renderNotFound() {
      app.innerHTML = `
        <div class="rounded-3xl border border-red-500/20 bg-red-950/20 p-6 text-center shadow-2xl shadow-black/40">
          <h1 class="text-2xl font-bold text-white">Kisi bulunamadi</h1>
          <p class="mt-2 text-sm leading-6 text-red-100/70">
            Bu baglantiya ait bir kullanici yok veya link hatali yazilmis olabilir.
          </p>

          <button
            type="button"
            onclick="goHome()"
            class="mt-6 w-full rounded-2xl bg-white px-5 py-3 text-sm font-bold text-zinc-950 transition duration-200 hover:scale-[1.02] active:scale-[0.99]"
          >
            Listeye Don
          </button>
        </div>
      `;
    }

    function getInitials(name) {
      return name
        .trim()
        .split(" ")
        .slice(0, 2)
        .map(part => part.charAt(0).toUpperCase())
        .join("");
    }

    function render() {
      const userId = getUserIdFromUrl();

      if (!userId) {
        renderHome();
        return;
      }

      const selectedUser = users.find(user => user.id === userId);

      if (!selectedUser) {
        renderNotFound();
        return;
      }

      renderDetail(selectedUser);
    }

    window.addEventListener("popstate", render);
    window.addEventListener("hashchange", render);

    render();
  </script>
</body>
</html>
